name: Docs

on:
  push:
    branches: [main]
    paths:
      # Re-run only when documentation-related files change
      - "docs/**"
      - "ase_biaspot/**"   # docstring changes trigger a rebuild
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "ase_biaspot/**"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read   # default
  pages:    write  # required for GitHub Pages deployment
  id-token: write  # OIDC token required for Pages deployment

jobs:
  # --------------------------------------------------------------------------
  # Build Sphinx docs
  # --------------------------------------------------------------------------
  build:
    name: Build docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install library + docs dependencies
        run: |
          # Install CPU-only torch so autodoc can import torch-dependent modules
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[docs]"

      - name: Build HTML
        working-directory: docs
        run: |
          # -W  : treat warnings as errors to catch incomplete documentation early
          # --keep-going : report all errors instead of stopping at the first one
          sphinx-build -b html -W --keep-going . _build/html

      - name: Upload Pages artifact
        # Only create the artifact on main branch pushes (PRs just verify the build)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  # --------------------------------------------------------------------------
  # Deploy to GitHub Pages (main branch only)
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
